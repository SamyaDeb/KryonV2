      - key: NEXT_PUBLIC_STELLAR_NETWORK
        value: testnet
      - key: NEXT_PUBLIC_STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: NEXT_PUBLIC_STELLAR_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: DATABASE_URL
        sync: false
      - key: MATCHER_OPERATOR_SECRET
        sync: false

  - type: worker
    name: kryon-liquidator
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx scripts/liquidation-keeper.ts
    plan: starter
    envVars:
      - key: NODE_ENV
