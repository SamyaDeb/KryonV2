      - key: DATABASE_URL
        sync: false

  - type: worker
    name: kryon-reconciler
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx scripts/settlement-reconciler.ts
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SETTLEMENT_JOB_MAX_AGE_MINUTES
        value: "15"
      - key: DATABASE_URL
        sync: false   # set in Render dashboard — do not commit secrets
      - key: MATCHER_OPERATOR_SECRET
        sync: false
