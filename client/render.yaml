      - key: NEXT_PUBLIC_STELLAR_NETWORK
        value: testnet
      - key: NEXT_PUBLIC_STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: NEXT_PUBLIC_STELLAR_PASSPHRASE
        value: "Test SDF Network ; September 2015"
