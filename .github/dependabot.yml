version: 2
updates:
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      client-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /kryon-protocol
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      protocol-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
