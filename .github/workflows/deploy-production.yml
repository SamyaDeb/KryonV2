name: deploy-production

# Deploys the trading client to Cloudflare Workers (via @opennextjs/cloudflare)
# after a push to main, but ONLY after the readiness gate (lint, typecheck,
# build) passes. The actual deploy runs under the `production` GitHub
# Environment, so branch/required-reviewer protection there acts as the human
# approval gate for a mainnet frontend.
#
# Required environment secrets: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit),
# CLOUDFLARE_ACCOUNT_ID. Runtime secrets (DATABASE_URL, MATCHER_OPERATOR_SECRET,
# UPSTASH_*) are set once via `wrangler secret put` — NOT through this workflow.
on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-production.yml"
      - ".github/actions/setup-client/**"

# Never run two production deploys at once and never cancel one in flight —
# cancelling mid-deploy can leave the Worker in a half-promoted state for live traders.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Default to read-only; the deploy job needs nothing more than reading the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: identical checks to CI so we never promote a broken build to mainnet.
  # ---------------------------------------------------------------------------
  gate:
    name: readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      - name: Lint
        run: npm run lint

      - name: Production readiness gate
        run: npm run production:gate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy: OpenNext build → wrangler deploy to Cloudflare Workers.
  # ---------------------------------------------------------------------------
  deploy:
    name: cloudflare production deploy
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # `environment: production` enforces required reviewers / wait timers / the
    # environment's own secrets. This is the mainnet promotion approval point.
    environment:
      name: production
      url: ${{ vars.NEXT_PUBLIC_APP_URL }}
    defaults:
      run:
        working-directory: client
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Build-time public config — baked into the client bundle by `next build`.
      # These come from the production GitHub Environment's variables so the
      # deployed Worker always matches the promoted contract set.
      NEXT_PUBLIC_STELLAR_NETWORK: ${{ vars.NEXT_PUBLIC_STELLAR_NETWORK || 'testnet' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
      NEXT_PUBLIC_STELLAR_RPC_URL: ${{ vars.NEXT_PUBLIC_STELLAR_RPC_URL }}
      NEXT_PUBLIC_STELLAR_HORIZON_URL: ${{ vars.NEXT_PUBLIC_STELLAR_HORIZON_URL }}
      NEXT_PUBLIC_STELLAR_PASSPHRASE: ${{ vars.NEXT_PUBLIC_STELLAR_PASSPHRASE }}
      NEXT_PUBLIC_ACTIVE_MARKETS: ${{ vars.NEXT_PUBLIC_ACTIVE_MARKETS || 'XLM-PERP' }}
      NEXT_PUBLIC_CONTRACT_GOVERNANCE: ${{ vars.NEXT_PUBLIC_CONTRACT_GOVERNANCE }}
      NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER: ${{ vars.NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER }}
      NEXT_PUBLIC_CONTRACT_VAULT: ${{ vars.NEXT_PUBLIC_CONTRACT_VAULT }}
      NEXT_PUBLIC_CONTRACT_ENGINE: ${{ vars.NEXT_PUBLIC_CONTRACT_ENGINE }}
      NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY: ${{ vars.NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY }}
      NEXT_PUBLIC_CONTRACT_INSURANCE: ${{ vars.NEXT_PUBLIC_CONTRACT_INSURANCE }}
      NEXT_PUBLIC_CONTRACT_LIQUIDATION: ${{ vars.NEXT_PUBLIC_CONTRACT_LIQUIDATION }}
      NEXT_PUBLIC_CONTRACT_RISK: ${{ vars.NEXT_PUBLIC_CONTRACT_RISK }}
      NEXT_PUBLIC_ASSET_NATIVE_XLM: ${{ vars.NEXT_PUBLIC_ASSET_NATIVE_XLM }}
      NEXT_PUBLIC_ASSET_USDC: ${{ vars.NEXT_PUBLIC_ASSET_USDC }}
      NEXT_PUBLIC_USDC_ISSUER: ${{ vars.NEXT_PUBLIC_USDC_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      # Build the Docusaurus docs site into client/public/docs so the same
      # deployment serves /docs (see client/next.config.ts rewrites). Done here
      # in the deploy job — not the CI gate — so docs build time doesn't gate releases.
      - name: Build docs into client/public/docs
        working-directory: docs
        run: |
          npm ci
          npm run build
          rm -rf ../client/public/docs
          cp -r build ../client/public/docs

      # Fail fast and loud if any deploy secret is missing, instead of letting
      # wrangler emit a confusing auth error halfway through.
      - name: Validate deploy secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"  || { echo "::error::CLOUDFLARE_API_TOKEN missing — add it in Settings → Environments → production"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::CLOUDFLARE_ACCOUNT_ID missing"; exit 1; }

      - name: Build Worker bundle (OpenNext)
        run: npm run cf:build

      # Retry-wrapped: the Cloudflare API can hit transient 5xx errors; a blip
      # must not fail a release.
      - name: Deploy to Cloudflare Workers
        run: |
          n=0; until [ $n -ge 3 ]; do
            npx wrangler deploy && {
              echo "### ✅ Production deploy (Cloudflare Workers)" >> "$GITHUB_STEP_SUMMARY"
              echo "Worker: kryon-client" >> "$GITHUB_STEP_SUMMARY"
              break
            }
            n=$((n+1)); echo "deploy attempt $n failed; retrying in $((n*15))s"; sleep $((n*15))
          done; [ $n -lt 3 ]
