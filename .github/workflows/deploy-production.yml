name: deploy-production

# Deploys the trading client to Vercel after a push to main, but ONLY after
# the readiness gate (lint, typecheck, build) passes.
#
# Required environment secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "docs/**"
      - ".github/workflows/deploy-production.yml"
      - ".github/actions/setup-client/**"

# Never run two production deploys at once and never cancel one in flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Default to read-only; the deploy job needs nothing more than reading the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: identical checks to CI so we never promote a broken build.
  # ---------------------------------------------------------------------------
  gate:
    name: readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      - name: Lint
        run: npm run lint

      - name: Production readiness gate
        run: npm run production:gate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy: Vercel prebuilt flow for production.
  # ---------------------------------------------------------------------------
  deploy:
    name: vercel production deploy
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: ${{ vars.NEXT_PUBLIC_APP_URL }}
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_CLI_VERSION: ${{ vars.VERCEL_CLI_VERSION || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      - name: Validate deploy secrets
        run: |
          test -n "$VERCEL_ORG_ID"     || { echo "::error::VERCEL_ORG_ID missing";     exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::error::VERCEL_PROJECT_ID missing"; exit 1; }
          test -n "$VERCEL_TOKEN"      || { echo "::error::VERCEL_TOKEN missing";       exit 1; }

      # public/docs is gitignored (generated from ../docs), so CI must build the
      # Docusaurus site here or the deployed app 404s on every /docs route.
      - name: Build docs site into public/docs
        run: |
          npm --prefix ../docs ci --no-audit --fund=false
          npm run docs:build

      - name: Pull Vercel environment
        run: |
          n=0; until [ $n -ge 3 ]; do
            npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment=production --token="$VERCEL_TOKEN" && break
            n=$((n+1)); echo "pull attempt $n failed; retrying in $((n*10))s"; sleep $((n*10))
          done; [ $n -lt 3 ]

      - name: Build Vercel output
        run: npx --yes vercel@"$VERCEL_CLI_VERSION" build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: |
          n=0; until [ $n -ge 3 ]; do
            url=$(npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt --prod --token="$VERCEL_TOKEN") && {
              echo "Deployed: $url"
              { echo "### ✅ Production deploy (Vercel)"; echo "$url"; } >> "$GITHUB_STEP_SUMMARY"
              break
            }
            n=$((n+1)); echo "deploy attempt $n failed; retrying in $((n*15))s"; sleep $((n*15))
          done; [ $n -lt 3 ]
