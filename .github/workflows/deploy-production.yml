name: deploy-production

# Auto-deploy the client to Vercel production on every push to main,
# but only after the readiness gate (lint, typecheck, build, audit) passes.
# Runs on GitHub's runners so it is not affected by local network/TLS issues.

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-production.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    name: readiness gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run production:gate
      - run: npx tsc --noEmit
      - run: npm audit --audit-level=moderate
      - run: npm run build

  deploy:
    name: vercel production deploy
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$VERCEL_ORG_ID"   || { echo "VERCEL_ORG_ID missing"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "VERCEL_PROJECT_ID missing"; exit 1; }
          test -n "$VERCEL_TOKEN"    || { echo "VERCEL_TOKEN missing — add it in repo Settings → Secrets"; exit 1; }

      - name: Pull Vercel production env
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production output
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
