name: deploy-client

# Manual, environment-aware deploy of the trading client to Vercel.
# Preview deploys are self-serve; production deploys require typing `mainnet`
# AND pass through the protected `production` GitHub Environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - preview
          - production
      confirm_mainnet:
        description: Type mainnet for production deploys
        required: false
        type: string

# Serialize per-target; never cancel an in-flight deploy (half-promoted state risk).
concurrency:
  group: deploy-client-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: build with the exact public env the target will run with, so a bad
  # config (missing mainnet contract address, etc.) is caught before deploy.
  # ---------------------------------------------------------------------------
  gate:
    name: deployment gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    env:
      NEXT_PUBLIC_STELLAR_NETWORK: ${{ inputs.environment == 'production' && 'mainnet' || 'testnet' }}
      NEXT_PUBLIC_APP_URL: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_APP_URL || 'https://preview.kryon.invalid' }}
      NEXT_PUBLIC_WS_URL: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_WS_URL || 'wss://preview-stream.kryon.invalid' }}
      NEXT_PUBLIC_STELLAR_RPC_URL: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_STELLAR_RPC_URL || 'https://soroban-testnet.stellar.org' }}
      NEXT_PUBLIC_STELLAR_PASSPHRASE: ${{ inputs.environment == 'production' && 'Public Global Stellar Network ; September 2015' || 'Test SDF Network ; September 2015' }}
      NEXT_PUBLIC_STELLAR_HORIZON_URL: ${{ inputs.environment == 'production' && 'https://horizon.stellar.org' || 'https://horizon-testnet.stellar.org' }}
      NEXT_PUBLIC_ACTIVE_MARKETS: ${{ vars.NEXT_PUBLIC_ACTIVE_MARKETS || 'XLM-PERP' }}
      NEXT_PUBLIC_CONTRACT_GOVERNANCE: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_GOVERNANCE || '' }}
      NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER || '' }}
      NEXT_PUBLIC_CONTRACT_VAULT: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_VAULT || '' }}
      NEXT_PUBLIC_CONTRACT_ENGINE: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_ENGINE || '' }}
      NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY || '' }}
      NEXT_PUBLIC_CONTRACT_INSURANCE: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_INSURANCE || '' }}
      NEXT_PUBLIC_CONTRACT_LIQUIDATION: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_LIQUIDATION || '' }}
      NEXT_PUBLIC_CONTRACT_RISK: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_CONTRACT_RISK || '' }}
      NEXT_PUBLIC_ASSET_NATIVE_XLM: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_ASSET_NATIVE_XLM || '' }}
      NEXT_PUBLIC_ASSET_USDC: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_ASSET_USDC || '' }}
      NEXT_PUBLIC_USDC_ISSUER: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_USDC_ISSUER || '' }}
      DATABASE_URL: ${{ inputs.environment == 'production' && secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/kryon' }}
      MATCHER_OPERATOR_SECRET: ${{ inputs.environment == 'production' && secrets.MATCHER_OPERATOR_SECRET || 'preview-placeholder' }}
      UPSTASH_REDIS_REST_URL: ${{ inputs.environment == 'production' && secrets.UPSTASH_REDIS_REST_URL || '' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ inputs.environment == 'production' && secrets.UPSTASH_REDIS_REST_TOKEN || '' }}
    steps:
      # Hard stop: a production target without the explicit `mainnet` confirmation
      # never even installs deps — defense against an accidental dropdown click.
      - name: Refuse unconfirmed production deploy
        if: ${{ inputs.environment == 'production' && inputs.confirm_mainnet != 'mainnet' }}
        run: |
          echo "::error::Production deploy requires confirm_mainnet=mainnet"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      - name: Lint
        run: npm run lint

      - name: Production readiness gate
        run: npm run production:gate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy: retry-wrapped Vercel prebuilt flow, scoped to the chosen environment.
  # ---------------------------------------------------------------------------
  deploy:
    name: vercel deploy
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'production' && vars.NEXT_PUBLIC_APP_URL || '' }}
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_CLI_VERSION: ${{ vars.VERCEL_CLI_VERSION || 'latest' }}
      TARGET_FLAG: ${{ inputs.environment == 'production' && '--prod' || '' }}
      VERCEL_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate deploy secrets
        run: |
          test -n "$VERCEL_ORG_ID"     || { echo "::error::VERCEL_ORG_ID missing";     exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::error::VERCEL_PROJECT_ID missing"; exit 1; }
          test -n "$VERCEL_TOKEN"      || { echo "::error::VERCEL_TOKEN missing";       exit 1; }

      - name: Pull Vercel environment
        run: |
          n=0; until [ $n -ge 3 ]; do
            npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment="$VERCEL_ENV" --token="$VERCEL_TOKEN" && break
            n=$((n+1)); echo "pull attempt $n failed; retrying in $((n*10))s"; sleep $((n*10))
          done; [ $n -lt 3 ]

      - name: Build Vercel output
        run: npx --yes vercel@"$VERCEL_CLI_VERSION" build $TARGET_FLAG --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: |
          n=0; until [ $n -ge 3 ]; do
            url=$(npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt $TARGET_FLAG --token="$VERCEL_TOKEN") && {
              echo "Deployed: $url"
              { echo "### ✅ ${VERCEL_ENV} deploy"; echo "$url"; } >> "$GITHUB_STEP_SUMMARY"
              break
            }
            n=$((n+1)); echo "deploy attempt $n failed; retrying in $((n*15))s"; sleep $((n*15))
          done; [ $n -lt 3 ]

  # ---------------------------------------------------------------------------
  # Post-deploy live validation — production only.
  # ---------------------------------------------------------------------------
  validate-production:
    name: validate production
    if: ${{ inputs.environment == 'production' }}
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    env:
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
      LIVE_GATE_MARKET_ID: ${{ vars.LIVE_GATE_MARKET_ID || '1' }}
      LIVE_GATE_SOAK_SECONDS: "120"
      LIVE_GATE_WS_CONNECTIONS: "100"
      LIVE_GATE_RATE_LIMIT_PROBE: "false"
      WALLET_E2E_EVIDENCE_URL: ${{ vars.WALLET_E2E_EVIDENCE_URL }}
      TRADING_E2E_EVIDENCE_URL: ${{ vars.TRADING_E2E_EVIDENCE_URL }}
      OBSERVABILITY_DASHBOARD_URL: ${{ vars.OBSERVABILITY_DASHBOARD_URL }}
      INCIDENT_RUNBOOK_URL: ${{ vars.INCIDENT_RUNBOOK_URL }}
      ROLLBACK_RUNBOOK_URL: ${{ vars.ROLLBACK_RUNBOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client

      - name: Live production gate
        run: npm run production:live-gate
