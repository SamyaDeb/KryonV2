name: dependency-review

# Blocks PRs that introduce dependencies with known vulnerabilities or
# disallowed licenses BEFORE they reach main. Unlike `npm audit` (which scans
# the whole tree and drifts daily), this only inspects the DIFF of a PR, so it
# is deterministic and fast — a proper merge gate for a mainnet codebase.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Fail the PR on high-or-worse vulnerabilities in newly added deps.
          fail-on-severity: high
          # Reject copyleft/unknown licenses that would taint a commercial DEX.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
          comment-summary-in-pr: on-failure
