name: tmp-mainnet-cutover

# ONE-OFF workflow: syncs the Vercel "production" environment's env vars to
# the live mainnet contract addresses/network, then redeploys production.
# Runs entirely on GitHub's runners (the Vercel CLI cannot reach api.vercel.com
# from the Claude Code sandbox that authored this).
#
# Deleted after the mainnet cutover is confirmed — this is not a
# recurring pipeline, `deploy-client.yml` already covers future redeploys.
on:
  workflow_dispatch:
    inputs:
      confirm_mainnet:
        description: Type mainnet to proceed
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync-and-deploy:
    if: ${{ inputs.confirm_mainnet == 'mainnet' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://kryonprotocol.vercel.app
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client
        with:
          install: "false"

      - name: Diagnose - which domains/project is actually live
        run: |
          echo "=== project info ==="
          curl -sS "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '{name, id, targets: (.targets // {} | keys)}'
          echo "=== domains bound to THIS project ==="
          curl -sS "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.domains[].name'
          echo "=== what project does kryonprotocol.vercel.app actually belong to? ==="
          curl -sS "https://api.vercel.com/v9/projects/kryonprotocol.vercel.app?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '{name, id}'
          echo "=== list ALL projects on this team ==="
          curl -sS "https://api.vercel.com/v9/projects?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.projects[] | "\(.id)  \(.name)"'

      # Server Components / API routes read process.env at RUNTIME on Vercel's
      # infrastructure from the project's actually-stored env config — the
      # local .env.production.local overlay below only affects what gets
      # embedded into the BUILD (client bundles). The interactive
      # `vercel env add` CLI (piped stdin) proved unreliable (silently left
      # NEXT_PUBLIC_ACTIVE_MARKETS empty in the first attempt), so this uses
      # Vercel's REST API directly: GET existing envs, PATCH if present else
      # POST, target=["production"]. This is what actually fixes runtime SSR.
      - name: Upsert mainnet env vars via Vercel REST API
        run: |
          set -euo pipefail
          API="https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID&upsert=true"
          upsert() {
            key="$1"; value="$2"
            payload=$(jq -n --arg k "$key" --arg v "$value" \
              '{key:$k, value:$v, type:"encrypted", target:["production"]}')
            resp=$(curl -sS -w '\n%{http_code}' -X POST "$API" \
              -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              -d "$payload")
            code=$(echo "$resp" | tail -1)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "  ✓ $key"
            else
              echo "  ✗ $key (HTTP $code): $(echo "$resp" | head -n -1 | head -c 200)"
              return 1
            fi
          }
          fail=0
          upsert NEXT_PUBLIC_STELLAR_NETWORK "mainnet" || fail=1
          upsert NEXT_PUBLIC_STELLAR_RPC_URL "https://mainnet.sorobanrpc.com" || fail=1
          upsert NEXT_PUBLIC_STELLAR_PASSPHRASE "Public Global Stellar Network ; September 2015" || fail=1
          upsert NEXT_PUBLIC_STELLAR_HORIZON_URL "https://horizon.stellar.org" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_GOVERNANCE "CDSIEH7UZ62BT523G3RGJQGJHE7AI4EV265ESKZB672GTIEZNBYPYDXU" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER "CD3ZFYZPLJ6W2KO6HD7HE5P5Q27M5N6ITUPHQDRP23NBIVKE6WTUY25F" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_VAULT "CDXGTJQS3XLGXSWDUHKMS5PBBFRRKRXRWH3HTBFNXBIAYEZNDTDKLR4J" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_ENGINE "CD6OMHCRDDBDO7I57HCUU52RORFPP7DUIRULWFBOX5WLCO5H2OB3W6LZ" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY "CBA2PSRHSIFTSUAFZWMF6CARNO7YR52PWLWLEXYVRACORS2RXNO2DUTJ" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_INSURANCE "CCBEJ3F2PUV5OA4JNX3CPSOJFQMYMFDPLNANR2GJZVQEEBFMB6JYNL54" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_LIQUIDATION "CBGSXCZTZOSBMM5RLGZWWLE2USNAXL5ZKCHTZQ6DOKBD3PIEUJXFYDRO" || fail=1
          upsert NEXT_PUBLIC_CONTRACT_RISK "CBHZWEIKXULFIH6DCSS7W6BJ3YUVQ5TJFYPP4UKQC4NKLNAF7VLPNVUI" || fail=1
          upsert NEXT_PUBLIC_ASSET_NATIVE_XLM "CAS3J7GYLGXMF6TDJBBYYSE3HQ6BBSMLNUQ34T6TZMYMW2EVH34XOWMA" || fail=1
          upsert NEXT_PUBLIC_ASSET_USDC "CCW67TSZV3SSS2HXMBQ5JFGCKJNXKZM7UQUWUZPUTHXSTZLEO7SJMI75" || fail=1
          upsert NEXT_PUBLIC_USDC_ISSUER "GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN" || fail=1
          upsert NEXT_PUBLIC_ACTIVE_MARKETS "XLM-PERP" || fail=1
          upsert NEXT_PUBLIC_APP_URL "https://kryonprotocol.vercel.app" || fail=1
          upsert NEXT_PUBLIC_INDEXER_URL "https://kryonprotocol.vercel.app/api" || fail=1
          upsert NEXT_PUBLIC_MATCHER_URL "https://kryonprotocol.vercel.app/api" || fail=1
          # No live wss:// endpoint yet (VM websocket service is not externally
          # reachable — pending OCI firewall rule + TLS termination). The
          # production readiness gate requires a syntactically valid wss:// URL;
          # the client's realtime layer only *attempts* to use it (capped,
          # jittered reconnect) and REST polling is the unconditional primary
          # data path, so this placeholder is safe until the real endpoint exists.
          upsert NEXT_PUBLIC_WS_URL "wss://ws.kryonprotocol.invalid" || fail=1
          upsert DATABASE_URL "${{ secrets.DATABASE_URL }}" || fail=1
          upsert MATCHER_OPERATOR_SECRET "${{ secrets.MATCHER_OPERATOR_SECRET }}" || fail=1
          upsert UPSTASH_REDIS_REST_URL "${{ secrets.UPSTASH_REDIS_REST_URL }}" || fail=1
          upsert UPSTASH_REDIS_REST_TOKEN "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" || fail=1
          [ "$fail" -eq 0 ] || { echo "one or more env upserts failed"; exit 1; }

      # Verify the API call actually stuck (values are never returned in
      # plaintext by Vercel — this only confirms the key+target now exists).
      - name: Verify env vars are present in Vercel
        run: |
          curl -sS "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.envs[] | select(.target[]? == "production") | .key' | sort | grep -E "STELLAR_NETWORK|ACTIVE_MARKETS"

      - name: Pull Vercel environment
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # `vercel env add` piped via stdin is interactive-prompt simulation and
      # proved flaky in practice (NEXT_PUBLIC_ACTIVE_MARKETS came back empty
      # on the first run despite the sync step reporting success). This step
      # is the actual correctness guarantee for THIS build: it overwrites the
      # pulled .env.production.local directly, byte-exact, no CLI prompts.
      - name: Force-correct the pulled env file
        run: |
          set -euo pipefail
          ENV_FILE=.vercel/.env.production.local
          touch "$ENV_FILE"
          set_kv() {
            key="$1"; value="$2"
            grep -v "^${key}=" "$ENV_FILE" > "$ENV_FILE.tmp" || true
            mv "$ENV_FILE.tmp" "$ENV_FILE"
            escaped=$(printf '%s' "$value" | sed 's/\\/\\\\/g; s/"/\\"/g')
            printf '%s="%s"\n' "$key" "$escaped" >> "$ENV_FILE"
          }
          set_kv NEXT_PUBLIC_STELLAR_NETWORK "mainnet"
          set_kv NEXT_PUBLIC_STELLAR_RPC_URL "https://mainnet.sorobanrpc.com"
          set_kv NEXT_PUBLIC_STELLAR_PASSPHRASE "Public Global Stellar Network ; September 2015"
          set_kv NEXT_PUBLIC_STELLAR_HORIZON_URL "https://horizon.stellar.org"
          set_kv NEXT_PUBLIC_CONTRACT_GOVERNANCE "CDSIEH7UZ62BT523G3RGJQGJHE7AI4EV265ESKZB672GTIEZNBYPYDXU"
          set_kv NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER "CD3ZFYZPLJ6W2KO6HD7HE5P5Q27M5N6ITUPHQDRP23NBIVKE6WTUY25F"
          set_kv NEXT_PUBLIC_CONTRACT_VAULT "CDXGTJQS3XLGXSWDUHKMS5PBBFRRKRXRWH3HTBFNXBIAYEZNDTDKLR4J"
          set_kv NEXT_PUBLIC_CONTRACT_ENGINE "CD6OMHCRDDBDO7I57HCUU52RORFPP7DUIRULWFBOX5WLCO5H2OB3W6LZ"
          set_kv NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY "CBA2PSRHSIFTSUAFZWMF6CARNO7YR52PWLWLEXYVRACORS2RXNO2DUTJ"
          set_kv NEXT_PUBLIC_CONTRACT_INSURANCE "CCBEJ3F2PUV5OA4JNX3CPSOJFQMYMFDPLNANR2GJZVQEEBFMB6JYNL54"
          set_kv NEXT_PUBLIC_CONTRACT_LIQUIDATION "CBGSXCZTZOSBMM5RLGZWWLE2USNAXL5ZKCHTZQ6DOKBD3PIEUJXFYDRO"
          set_kv NEXT_PUBLIC_CONTRACT_RISK "CBHZWEIKXULFIH6DCSS7W6BJ3YUVQ5TJFYPP4UKQC4NKLNAF7VLPNVUI"
          set_kv NEXT_PUBLIC_ASSET_NATIVE_XLM "CAS3J7GYLGXMF6TDJBBYYSE3HQ6BBSMLNUQ34T6TZMYMW2EVH34XOWMA"
          set_kv NEXT_PUBLIC_ASSET_USDC "CCW67TSZV3SSS2HXMBQ5JFGCKJNXKZM7UQUWUZPUTHXSTZLEO7SJMI75"
          set_kv NEXT_PUBLIC_USDC_ISSUER "GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN"
          set_kv NEXT_PUBLIC_ACTIVE_MARKETS "XLM-PERP"
          set_kv NEXT_PUBLIC_APP_URL "https://kryonprotocol.vercel.app"
          set_kv NEXT_PUBLIC_INDEXER_URL "https://kryonprotocol.vercel.app/api"
          set_kv NEXT_PUBLIC_MATCHER_URL "https://kryonprotocol.vercel.app/api"
          set_kv NEXT_PUBLIC_WS_URL "wss://ws.kryonprotocol.invalid"
          set_kv DATABASE_URL "${{ secrets.DATABASE_URL }}"
          set_kv MATCHER_OPERATOR_SECRET "${{ secrets.MATCHER_OPERATOR_SECRET }}"
          set_kv UPSTASH_REDIS_REST_URL "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          set_kv UPSTASH_REDIS_REST_TOKEN "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          echo "non-secret values confirmed in pulled env file:"
          grep -E "^NEXT_PUBLIC_(STELLAR_NETWORK|ACTIVE_MARKETS|CONTRACT_VAULT)=" "$ENV_FILE"

      - name: Build
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        id: deploy
        run: |
          url=$(npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          { echo "### mainnet cutover deploy"; echo "$url"; } >> "$GITHUB_STEP_SUMMARY"

      - name: Diagnose - is the custom domain actually aliased to this deployment
        run: |
          sleep 5
          echo "=== last 3 production deployments (id, url, createdAt, state) ==="
          curl -sS "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=production&limit=3" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '.deployments[] | {uid, url, createdAt, state}'
          echo "=== who currently owns kryonprotocol.vercel.app (alias lookup) ==="
          curl -sS "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains/kryonprotocol.vercel.app?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq .
          echo "=== force-alias the just-built deployment to the custom domain ==="
          npx --yes vercel alias set "${{ steps.deploy.outputs.url }}" kryonprotocol.vercel.app --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" || echo "alias set failed (see above)"
