name: tmp-mainnet-cutover

# ONE-OFF workflow: syncs the Vercel "production" environment's env vars to
# the live mainnet contract addresses/network, then redeploys production.
# Runs entirely on GitHub's runners (the Vercel CLI cannot reach api.vercel.com
# from the Claude Code sandbox that authored this).
#
# Deleted after the mainnet cutover is confirmed — this is not a
# recurring pipeline, `deploy-client.yml` already covers future redeploys.
on:
  workflow_dispatch:
    inputs:
      confirm_mainnet:
        description: Type mainnet to proceed
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync-and-deploy:
    if: ${{ inputs.confirm_mainnet == 'mainnet' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://kryonprotocol.vercel.app
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-client
        with:
          install: "false"

      # Best-effort persistence into Vercel's own dashboard config, so future
      # ad-hoc deploys (deploy-client.yml, `vercel --prod` from a terminal)
      # also pick up the right values. THIS deploy's correctness does not
      # depend on it — see "Force-correct the pulled env file" below.
      - name: Sync mainnet env vars into Vercel production (best-effort)
        run: |
          set -uo pipefail
          sync() {
            name="$1"; value="$2"
            npx --yes vercel env rm "$name" production --yes --token="$VERCEL_TOKEN" >/dev/null 2>&1 || true
            printf '%s' "$value" | npx --yes vercel env add "$name" production --token="$VERCEL_TOKEN" \
              || echo "warn: failed to sync $name (non-fatal, next deploy will retry)"
          }
          sync NEXT_PUBLIC_STELLAR_NETWORK "mainnet"
          sync NEXT_PUBLIC_STELLAR_RPC_URL "https://mainnet.sorobanrpc.com"
          sync NEXT_PUBLIC_STELLAR_PASSPHRASE "Public Global Stellar Network ; September 2015"
          sync NEXT_PUBLIC_STELLAR_HORIZON_URL "https://horizon.stellar.org"
          sync NEXT_PUBLIC_CONTRACT_GOVERNANCE "CDSIEH7UZ62BT523G3RGJQGJHE7AI4EV265ESKZB672GTIEZNBYPYDXU"
          sync NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER "CD3ZFYZPLJ6W2KO6HD7HE5P5Q27M5N6ITUPHQDRP23NBIVKE6WTUY25F"
          sync NEXT_PUBLIC_CONTRACT_VAULT "CDXGTJQS3XLGXSWDUHKMS5PBBFRRKRXRWH3HTBFNXBIAYEZNDTDKLR4J"
          sync NEXT_PUBLIC_CONTRACT_ENGINE "CD6OMHCRDDBDO7I57HCUU52RORFPP7DUIRULWFBOX5WLCO5H2OB3W6LZ"
          sync NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY "CBA2PSRHSIFTSUAFZWMF6CARNO7YR52PWLWLEXYVRACORS2RXNO2DUTJ"
          sync NEXT_PUBLIC_CONTRACT_INSURANCE "CCBEJ3F2PUV5OA4JNX3CPSOJFQMYMFDPLNANR2GJZVQEEBFMB6JYNL54"
          sync NEXT_PUBLIC_CONTRACT_LIQUIDATION "CBGSXCZTZOSBMM5RLGZWWLE2USNAXL5ZKCHTZQ6DOKBD3PIEUJXFYDRO"
          sync NEXT_PUBLIC_CONTRACT_RISK "CBHZWEIKXULFIH6DCSS7W6BJ3YUVQ5TJFYPP4UKQC4NKLNAF7VLPNVUI"
          sync NEXT_PUBLIC_ASSET_NATIVE_XLM "CAS3J7GYLGXMF6TDJBBYYSE3HQ6BBSMLNUQ34T6TZMYMW2EVH34XOWMA"
          sync NEXT_PUBLIC_ASSET_USDC "CCW67TSZV3SSS2HXMBQ5JFGCKJNXKZM7UQUWUZPUTHXSTZLEO7SJMI75"
          sync NEXT_PUBLIC_USDC_ISSUER "GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN"
          sync NEXT_PUBLIC_ACTIVE_MARKETS "XLM-PERP"
          sync NEXT_PUBLIC_APP_URL "https://kryonprotocol.vercel.app"
          sync NEXT_PUBLIC_INDEXER_URL "https://kryonprotocol.vercel.app/api"
          sync NEXT_PUBLIC_MATCHER_URL "https://kryonprotocol.vercel.app/api"
          # No live wss:// endpoint yet (VM websocket service is not externally
          # reachable — pending OCI firewall rule + TLS termination). The
          # production readiness gate requires a syntactically valid wss:// URL;
          # the client's realtime layer only *attempts* to use it (capped,
          # jittered reconnect) and REST polling is the unconditional primary
          # data path, so this placeholder is safe until the real endpoint exists.
          sync NEXT_PUBLIC_WS_URL "wss://ws.kryonprotocol.invalid"
          sync DATABASE_URL "${{ secrets.DATABASE_URL }}"
          sync MATCHER_OPERATOR_SECRET "${{ secrets.MATCHER_OPERATOR_SECRET }}"
          sync UPSTASH_REDIS_REST_URL "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          sync UPSTASH_REDIS_REST_TOKEN "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"

      - name: Pull Vercel environment
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # `vercel env add` piped via stdin is interactive-prompt simulation and
      # proved flaky in practice (NEXT_PUBLIC_ACTIVE_MARKETS came back empty
      # on the first run despite the sync step reporting success). This step
      # is the actual correctness guarantee for THIS build: it overwrites the
      # pulled .env.production.local directly, byte-exact, no CLI prompts.
      - name: Force-correct the pulled env file
        run: |
          set -euo pipefail
          ENV_FILE=.vercel/.env.production.local
          touch "$ENV_FILE"
          set_kv() {
            key="$1"; value="$2"
            grep -v "^${key}=" "$ENV_FILE" > "$ENV_FILE.tmp" || true
            mv "$ENV_FILE.tmp" "$ENV_FILE"
            escaped=$(printf '%s' "$value" | sed 's/\\/\\\\/g; s/"/\\"/g')
            printf '%s="%s"\n' "$key" "$escaped" >> "$ENV_FILE"
          }
          set_kv NEXT_PUBLIC_STELLAR_NETWORK "mainnet"
          set_kv NEXT_PUBLIC_STELLAR_RPC_URL "https://mainnet.sorobanrpc.com"
          set_kv NEXT_PUBLIC_STELLAR_PASSPHRASE "Public Global Stellar Network ; September 2015"
          set_kv NEXT_PUBLIC_STELLAR_HORIZON_URL "https://horizon.stellar.org"
          set_kv NEXT_PUBLIC_CONTRACT_GOVERNANCE "CDSIEH7UZ62BT523G3RGJQGJHE7AI4EV265ESKZB672GTIEZNBYPYDXU"
          set_kv NEXT_PUBLIC_CONTRACT_ORACLE_ADAPTER "CD3ZFYZPLJ6W2KO6HD7HE5P5Q27M5N6ITUPHQDRP23NBIVKE6WTUY25F"
          set_kv NEXT_PUBLIC_CONTRACT_VAULT "CDXGTJQS3XLGXSWDUHKMS5PBBFRRKRXRWH3HTBFNXBIAYEZNDTDKLR4J"
          set_kv NEXT_PUBLIC_CONTRACT_ENGINE "CD6OMHCRDDBDO7I57HCUU52RORFPP7DUIRULWFBOX5WLCO5H2OB3W6LZ"
          set_kv NEXT_PUBLIC_CONTRACT_ORDER_GATEWAY "CBA2PSRHSIFTSUAFZWMF6CARNO7YR52PWLWLEXYVRACORS2RXNO2DUTJ"
          set_kv NEXT_PUBLIC_CONTRACT_INSURANCE "CCBEJ3F2PUV5OA4JNX3CPSOJFQMYMFDPLNANR2GJZVQEEBFMB6JYNL54"
          set_kv NEXT_PUBLIC_CONTRACT_LIQUIDATION "CBGSXCZTZOSBMM5RLGZWWLE2USNAXL5ZKCHTZQ6DOKBD3PIEUJXFYDRO"
          set_kv NEXT_PUBLIC_CONTRACT_RISK "CBHZWEIKXULFIH6DCSS7W6BJ3YUVQ5TJFYPP4UKQC4NKLNAF7VLPNVUI"
          set_kv NEXT_PUBLIC_ASSET_NATIVE_XLM "CAS3J7GYLGXMF6TDJBBYYSE3HQ6BBSMLNUQ34T6TZMYMW2EVH34XOWMA"
          set_kv NEXT_PUBLIC_ASSET_USDC "CCW67TSZV3SSS2HXMBQ5JFGCKJNXKZM7UQUWUZPUTHXSTZLEO7SJMI75"
          set_kv NEXT_PUBLIC_USDC_ISSUER "GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN"
          set_kv NEXT_PUBLIC_ACTIVE_MARKETS "XLM-PERP"
          set_kv NEXT_PUBLIC_APP_URL "https://kryonprotocol.vercel.app"
          set_kv NEXT_PUBLIC_INDEXER_URL "https://kryonprotocol.vercel.app/api"
          set_kv NEXT_PUBLIC_MATCHER_URL "https://kryonprotocol.vercel.app/api"
          set_kv NEXT_PUBLIC_WS_URL "wss://ws.kryonprotocol.invalid"
          set_kv DATABASE_URL "${{ secrets.DATABASE_URL }}"
          set_kv MATCHER_OPERATOR_SECRET "${{ secrets.MATCHER_OPERATOR_SECRET }}"
          set_kv UPSTASH_REDIS_REST_URL "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          set_kv UPSTASH_REDIS_REST_TOKEN "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          echo "non-secret values confirmed in pulled env file:"
          grep -E "^NEXT_PUBLIC_(STELLAR_NETWORK|ACTIVE_MARKETS|CONTRACT_VAULT)=" "$ENV_FILE"

      - name: Build
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: |
          url=$(npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $url"
          { echo "### mainnet cutover deploy"; echo "$url"; } >> "$GITHUB_STEP_SUMMARY"
